<!DOCTYPE html>
<html lang="pt-br" class="bg-gray-50 dark:bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Documentação</title>
  <link rel="stylesheet" href="../styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (
      localStorage.theme === 'dark' ||
      (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
  <header class="bg-gray-800 text-white shadow p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Minha Documentação</h1>
    <div class="space-x-2 flex items-center">
      <button onclick="setLanguage('pt')">🇧🇷</button>
      <button onclick="setLanguage('de')">🇩🇪</button>
      <button onclick="setLanguage('en')">🇺🇸</button>
      <button onclick="toggleDarkMode()" class="rounded px-3 py-1 border border-gray-300 dark:border-gray-700">🌙/☀️</button>
    </div>
  </header>
  <div class="flex flex-1">
    <aside class="w-64 bg-gray-100 dark:bg-gray-900 p-4 hidden md:block overflow-y-auto">
      <nav>
        <ul id="menu-list" class="space-y-2">
          <li><a href="template.html?file=introducao.md" class="block hover:underline">Introdução</a></li>
          <li><a href="template.html?file=instalacao.md" class="block hover:underline">Instalação</a></li>
          <li><a href="template.html?file=uso.md" class="block hover:underline">Como Usar</a></li>
          <li><a href="template.html?file=faq.md" class="block hover:underline">FAQ</a></li>
          <li><a href="template.html?file=contato.md" class="block hover:underline">Contato</a></li>
          <li><a href="template.html?file=migracao-dados.md" class="block hover:underline">Migração</a></li>
          <li><a href="template.html?file=redefinindo-senhas.md" class="block hover:underline">Redefinindo Senhas</a></li>
          <li><a href="template.html?file=configuracao-rede.md" class="block hover:underline">Configuração de Rede</a></li>
          <li><a href="template.html?file=resolucao-problemas.md" class="block hover:underline">Resolução de Problemas</a></li>
        </ul>
        <div class="mt-4 space-y-1">
          <input id="docTitle" placeholder="Título" class="w-full px-2 py-1 border rounded" />
          <textarea id="docText" placeholder="Conteúdo em Markdown" class="w-full px-2 py-1 border rounded"></textarea>
          <button onclick="addDoc()" class="w-full bg-blue-500 text-white px-2 py-1 rounded">Adicionar documentação</button>
        </div>
      </nav>
    </aside>
    <main id="content" class="flex-1 p-6 prose prose-slate dark:prose-invert max-w-none whitespace-pre-wrap"></main>
  </div>
  <footer class="bg-gray-800 text-white text-center p-4 text-sm border-t border-gray-700">
    &copy; 2024 Minha Documentação.
  </footer>
  <script src="../script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const docId = params.get('doc');
    const raw = params.get('raw');
    async function render(text, title) {
      document.title = title || document.title;
      text = await translateText(text);
      document.getElementById('content').innerText = text;
    }

    if (docId !== null) {
      const docs = JSON.parse(localStorage.getItem('customDocs') || '[]');
      const doc = docs[docId];
      if (doc) {
        render(doc.content, doc.title);
      } else {
        document.getElementById('content').innerText = 'Documento não encontrado.';
      }
    } else if (file) {
      fetch(file)
        .then(r => r.text())
        .then(text => render(text))
        .catch(() => {
          document.getElementById('content').innerText = 'Arquivo não encontrado.';
        });
    } else if (raw) {
      fetch(`../rawdocs/${raw}`)
        .then(r => r.text())
        .then(text => render(text))
        .catch(() => {
          document.getElementById('content').innerText = 'Arquivo não encontrado.';
        });
    }
  </script>
</body>
</html>
