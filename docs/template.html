<!DOCTYPE html>
<html lang="pt-br" class="bg-gray-50 dark:bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Documentação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (
      localStorage.theme === 'dark' ||
      (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
  <header class="bg-white dark:bg-gray-950 shadow p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Minha Documentação</h1>
    <button onclick="toggleDarkMode()" class="rounded px-3 py-1 border border-gray-300 dark:border-gray-700">🌙/☀️</button>
  </header>
  <main id="content" class="p-6 prose prose-slate dark:prose-invert max-w-none flex-1 whitespace-pre-wrap"></main>
  <footer class="bg-white dark:bg-gray-950 text-center p-4 text-sm border-t border-gray-200 dark:border-gray-800">
    &copy; 2024 Minha Documentação.
  </footer>
  <script>
    function toggleDarkMode() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        html.classList.add('dark');
        localStorage.theme = 'dark';
      }
    }
    // Carrega o arquivo Markdown indicado no parâmetro ?file=
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (file) {
      fetch(file)
        .then(r => r.text())
        .then(text => {
          document.getElementById('content').innerText = text;
        })
        .catch(() => {
          document.getElementById('content').innerText = 'Arquivo não encontrado.';
        });
    }
  </script>
</body>
</html>
