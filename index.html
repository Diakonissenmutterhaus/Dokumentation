<!DOCTYPE html>
<html lang="pt-br" class="bg-gray-50 dark:bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minha Documentação</title>
  <!-- Tailwind CSS CDN e estilos extras -->
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Dark mode automático
    if (
      localStorage.theme === 'dark' ||
      (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
</head>
<body class="text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
  <header class="bg-white dark:bg-gray-950 shadow p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Minha Documentação</h1>
    <button onclick="toggleDarkMode()" class="rounded px-3 py-1 border border-gray-300 dark:border-gray-700">
      🌙/☀️
    </button>
  </header>

  <div class="flex flex-1">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-100 dark:bg-gray-800 p-4 hidden md:block min-h-full">
      <nav>
        <ul id="menu-list" class="space-y-2">
          <li><a href="docs/template.html?file=introducao.md" class="block hover:underline">Introdução</a></li>
          <li><a href="docs/template.html?file=instalacao.md" class="block hover:underline">Instalação</a></li>
          <li><a href="docs/template.html?file=uso.md" class="block hover:underline">Como Usar</a></li>
          <li><a href="docs/template.html?file=faq.md" class="block hover:underline">FAQ</a></li>
          <li><a href="docs/template.html?file=contato.md" class="block hover:underline">Contato</a></li>
          <li><a href="docs/template.html?file=migracao-dados.md" class="block hover:underline">Migração</a></li>
          <li><a href="docs/template.html?file=redefinindo-senhas.md" class="block hover:underline">Redefinindo Senhas</a></li>
          <li><a href="docs/template.html?file=configuracao-rede.md" class="block hover:underline">Configuração de Rede</a></li>
          <li><a href="docs/template.html?file=resolucao-problemas.md" class="block hover:underline">Resolução de Problemas</a></li>
        </ul>
        <div class="mt-4 space-y-1">
          <input id="docTitle" placeholder="Título" class="w-full px-2 py-1 border rounded" />
          <textarea id="docText" placeholder="Conteúdo em Markdown" class="w-full px-2 py-1 border rounded"></textarea>
          <button onclick="addDoc()" class="w-full bg-blue-500 text-white px-2 py-1 rounded">Adicionar documentação</button>
        </div>
      </nav>
    </aside>

    <!-- Conteúdo -->
    <main class="flex-1 p-6">
      <p>Selecione uma seção no menu para visualizar a documentação.</p>
    </main>
  </div>

  <footer class="bg-white dark:bg-gray-950 text-center p-4 text-sm border-t border-gray-200 dark:border-gray-800">
    &copy; 2024 Minha Documentação. Feito com 💙 e TailwindCSS.
  </footer>

  <script src="script.js"></script>
</body>
</html>
